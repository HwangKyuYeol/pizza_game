<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
  <meta name="theme-color" content="#d91e24">
  <title>선명희피자 500점 챌린지</title>
  <link rel="stylesheet" href="./style.css?v=complete2">
</head>
<body>
<main id="gameRoot">
  <div class="scene" aria-hidden="true"><img src="./assets/images/background.png" alt=""></div>
  <canvas id="gameCanvas"></canvas>

  <section id="hud" class="hud is-hidden">
    <div class="hud-top">
      <div id="hearts" class="hud-pill"></div>
      <div class="hud-pill">🏆 <b id="bestScore">0</b></div>
    </div>
    <div class="stats">
      <div><span>점수</span><strong><b id="score">0</b>/500</strong></div>
      <div><span>시간</span><strong><b id="time">30</b>초</strong></div>
      <div><span>등급</span><strong id="rank">C</strong></div>
    </div>
    <div class="progress-track"><div id="progressBar"></div></div>
    <div id="pizzaStage" class="stage-label">🍞 도우 준비</div>
    <div class="mission">
      <span>오늘의 미션</span>
      <strong id="missionText">준비 중</strong>
      <small id="missionProgress">0 / 0</small>
    </div>
    <div class="hud-actions">
      <button id="soundBtn" type="button">🔊</button>
      <button id="pauseBtn" type="button">Ⅱ</button>
    </div>
    <div id="feverBanner" class="fever is-hidden">🔥 FEVER · 점수 2배 🔥</div>
    <div id="comboBanner" class="combo is-hidden"></div>
  </section>

  <section id="startScreen" class="overlay">
    <div class="panel">
      <p class="brand">선명희피자</p>
      <h1>500점<br>피자 챌린지</h1>
      <p class="lead">30초 안에 재료를 받아<br>맛있는 피자를 완성하세요!</p>
      <div class="rule-grid">
        <div><b>일반 재료</b><span>+10점</span></div>
        <div><b>황금 피자</b><span>+50점</span></div>
        <div><b>폭탄</b><span>-10점 · 하트 -1</span></div>
        <div><b>마지막 8초</b><span>점수 2배</span></div>
      </div>
      <p class="guide">PC는 마우스, 모바일은 손가락으로 피자박스를 움직여요.</p>
      <button id="startBtn" class="primary-btn" type="button">게임 시작</button>
    </div>
  </section>

  <section id="countdown" class="countdown is-hidden"><strong id="countdownText">3</strong></section>

  <section id="pauseScreen" class="overlay is-hidden">
    <div class="panel compact">
      <h2>일시정지</h2>
      <button id="resumeBtn" class="primary-btn" type="button">계속하기</button>
    </div>
  </section>

  <section id="bakeScreen" class="overlay is-hidden">
    <div class="oven-card">
      <div class="oven-fire">🔥</div>
      <h2>오븐에서 굽는 중...</h2>
      <div class="bake-track"><div id="bakeBar"></div></div>
    </div>
  </section>

  <section id="resultScreen" class="overlay is-hidden">
    <div class="panel">
      <p class="brand">선명희피자</p>
      <h2 id="resultTitle">도전 종료!</h2>
      <div id="resultRank" class="result-rank">C</div>
      <p id="resultMessage" class="lead"></p>
      <div id="successBox" class="success-box is-hidden">
        <span>SUCCESS CODE</span>
        <strong id="successCode"></strong>
        <small>결과 화면을 캡처해 이벤트에 참여해 주세요.</small>
      </div>
      <button id="retryBtn" class="primary-btn" type="button">다시 도전</button>
    </div>
  </section>
</main>
<script src="./game.js?v=complete2"></script>
</body>
</html>
