<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no"><title>선명희피자 500점 챌린지</title><link rel="stylesheet" href="./style.css"></head><body>
<main id="app"><div class="background"></div><canvas id="gameCanvas"></canvas>
<section id="hud" class="hud hidden"><div class="top"><div id="hearts"></div><div>🏆 최고 <b id="best">0</b></div></div><div class="stats"><div>점수 <b id="score">0</b>/500</div><div>시간 <b id="time">30</b>초</div><div>등급 <b id="rank">C</b></div></div><div class="track"><div id="progress"></div></div><div id="stage">🍞 도우 준비</div><div id="mission"></div><div id="fever" class="hidden">🔥 FEVER x2 🔥</div></section>
<section id="start" class="screen"><div class="panel"><p class="brand">선명희피자</p><h1>500점<br>피자 챌린지</h1><p>30초 안에 500점을 모아 피자를 완성하세요!</p><div class="rules"><div>재료 +10</div><div>황금피자 +50</div><div>폭탄 -10 / 하트 -1</div><div>마지막 8초 x2</div></div><button id="startBtn">게임 시작</button></div></section>
<section id="count" class="count hidden"><b id="countText">3</b></section>
<section id="result" class="screen hidden"><div class="panel"><p class="brand">선명희피자</p><h2 id="resultTitle"></h2><div id="resultRank"></div><p id="resultMsg"></p><div id="codeBox" class="hidden">SUCCESS CODE<br><b id="code"></b></div><button id="retryBtn">다시 하기</button></div></section>
</main><script src="./audio.js"></script><script src="./missions.js"></script><script src="./items.js"></script><script src="./ui.js"></script><script src="./game.js"></script></body></html>
