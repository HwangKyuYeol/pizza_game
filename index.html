<!doctype html><html lang="ko"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="theme-color" content="#d71920"><title>선명희피자 재료 받기 챌린지</title>
<link rel="stylesheet" href="./style.css"></head><body><main id="app"><div class="bg"></div><canvas id="cv"></canvas>
<section id="hud" class="hidden"><div id="hearts" class="hearts"></div><div class="stats"><div class="stat"><small>점수</small><b><span id="score">0</span> / 200</b></div><div class="stat"><small>남은 시간</small><b><span id="time">30</span>초</b></div></div><div class="track"><div id="bar" class="bar"></div></div><div class="actions"><button id="sound" class="icon">🔊</button><button id="pause" class="icon">Ⅱ</button></div><div id="fever" class="fever hidden">🔥 FEVER TIME 🔥</div></section>
<section id="start" class="screen"><div class="panel"><p class="brand">선명희피자</p><h1>피자 재료 받기<br>챌린지</h1><p class="lead">30초 안에 200점을 달성하세요!</p><div class="rules"><div><b>재료</b><span>+10점</span></div><div><b>폭탄</b><span>-10점 · 하트 -1</span></div><div><b>하트</b><span>3개</span></div></div><p class="guide">PC: 마우스로 이동<br>모바일: 화면을 누른 채 좌우로 드래그</p><button id="startBtn" class="main">게임 시작</button></div></section>
<section id="count" class="count hidden"><b id="countText">3</b></section>
<section id="pauseScreen" class="screen hidden"><div class="panel"><h2>일시정지</h2><p class="lead">준비되면 다시 시작하세요.</p><button id="resume" class="main">계속하기</button></div></section>
<section id="result" class="screen hidden"><div class="panel"><p class="brand">선명희피자</p><h2 id="resultTitle"></h2><div id="pizza" class="pizza hidden">🍕</div><p id="resultMsg" class="lead"></p><div id="codeBox" class="code hidden"><span>SUCCESS CODE</span><strong id="code"></strong><small>이 화면을 캡처해 댓글 또는 DM으로 보내주세요.</small></div><div class="result-actions"><button id="save" class="sub hidden">결과 이미지 저장</button><button id="retry" class="main">다시 하기</button></div></div></section>
</main><script src="./game.js"></script></body></html>
